<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZFS South and North Island Bases</title>

<style>
body {
  margin: 0;
  background-color: #f0f0f0;
  font-family: Arial, sans-serif;
}

/* Center map on page */
main {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container for overlays */
.map-container {
  position: relative;
  display: inline-block;
}

/* Main map image */
.map-container img.map {
  max-height: 90vh;
  border: 2px solid #333;
  border-radius: 8px;
}

/* Home button (top right) */
.map-container nav {
  position: absolute;
  top: 12px;
  right: 12px;
}

.map-container nav a {
  text-decoration: none;
  color: white;
  background: rgba(0,0,0,0.7);
  font-size: 14px;
  font-weight: bold;
  padding: 6px 10px;
  border-radius: 5px;
}

.map-container nav a:hover {
  background: rgba(0,0,0,0.9);
}

/* Logo overlay (top left) */
.logo {
  position: absolute;
  top: 10px;
  left: 10px;
}

.logo img {
  height: 50px;
}
</style>
</head>

<body>

<main>
  <div class="map-container">

    <!-- Logo -->
    <div class="logo">
      <img src="../assets/images/NZFSLogoRound.png" alt="Logo">
    </div>

    <!-- Home Button -->
    <nav>
      <a href="../index.html">Home</a>
    </nav>

    <!-- Map Image -->
    <img class="map" src="../assets/images/BasesNZFS.jpg" alt="Map image">

  </div>
</main>

</body>
</html>
